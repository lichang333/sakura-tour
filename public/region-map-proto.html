<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>制县等级 · 云贵川 — 积木地图原型</title>
<style>
  :root {
    --paper: #E7E0D0;
    --land: #FBF8F1;
    --ink: #1B2430;
    --text-mid: #586572;
    --copper: #A9702F;
    --l1: #C89F63; --l2: #B88749; --l3: #A16829; --l4: #834F1D; --l5: #613813;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 24px 12px 48px;
  }
  .head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 4px; }
  h1 { font-family: 'Songti SC','Noto Serif SC',serif; font-size: 26px; color: var(--ink); letter-spacing: 0.04em; }
  .score { font-family: 'Songti SC',serif; font-size: 30px; font-weight: 700; color: var(--copper); }
  .score small { font-size: 13px; color: var(--text-mid); font-weight: 600; }
  .sub { font-size: 13px; color: var(--text-mid); font-weight: 600; margin-bottom: 14px; }

  .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 16px; margin-bottom: 12px; max-width: 760px; }
  .lg-row { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; color: var(--ink); }
  .lg-sw { width: 20px; height: 14px; border: 1.5px solid var(--ink); border-radius: 3px; flex-shrink: 0; }
  .lg-sw.lv0 { background: var(--land); }
  .lg-sw.lv1 { background: var(--l1); } .lg-sw.lv2 { background: var(--l2); }
  .lg-sw.lv3 { background: var(--l3); } .lg-sw.lv4 { background: var(--l4); } .lg-sw.lv5 { background: var(--l5); }
  .lg-lv { color: var(--text-mid); font-weight: 600; }

  .stage { position: relative; max-width: 720px; width: 100%; }
  svg { width: 100%; height: auto; display: block; overflow: visible; }

  .cellpoly {
    fill: var(--land); stroke: var(--ink); stroke-width: 1.4;
    stroke-linejoin: round; cursor: pointer; transition: filter 0.12s ease;
  }
  .cellpoly:hover { filter: brightness(0.93); }
  .cellpoly.lv1 { fill: var(--l1); } .cellpoly.lv2 { fill: var(--l2); }
  .cellpoly.lv3 { fill: var(--l3); } .cellpoly.lv4 { fill: var(--l4); } .cellpoly.lv5 { fill: var(--l5); }

  .rlabel { font-weight: 700; fill: var(--ink); text-anchor: middle; dominant-baseline: central; pointer-events: none; }
  .rlabel.lv3, .rlabel.lv4, .rlabel.lv5 { fill: #FFF6E8; }

  .popup {
    position: absolute; background: #FFFDF8; border: 2px solid var(--ink);
    border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    z-index: 10; min-width: 150px; overflow: hidden; display: none;
  }
  .popup.open { display: block; }
  .pp-title { font-size: 13px; font-weight: 800; color: var(--ink); padding: 8px 12px; background: var(--paper); border-bottom: 1.5px solid var(--ink); }
  .pp-item { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 12px; border: none; background: transparent; font-size: 13px; font-weight: 700; color: var(--ink); cursor: pointer; text-align: left; }
  .pp-item:hover { background: #EFE9DB; }
  .pp-item .lg-sw { width: 18px; height: 12px; }
  .pp-item.current { background: #E8E0CC; }

  .foot { margin-top: 12px; font-size: 12px; color: var(--text-mid); font-weight: 600; }
</style>
</head>
<body>
  <div class="head">
    <h1>制县等级 · 云贵川</h1>
    <div class="score"><span id="score">0</span><small> 分 · <span id="touched">0</span>/46 地</small></div>
  </div>
  <p class="sub">点击地州市，选择你的到访等级 —— 积木拼出云贵川真实轮廓</p>

  <div class="legend" id="legend"></div>

  <div class="stage">
    <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="popup" id="popup"></div>
  </div>
  <p class="foot">川 21 · 黔 9 · 滇 16 ｜ 由三省真实边界栅格化为积木网格 ｜ 数据存于本机</p>

<script src="/tile-geo.js"></script>
<script>
const LEVELS = [
  { v:5, label:'住过 · 居住过' }, { v:4, label:'住宿 · 过夜旅行' },
  { v:3, label:'玩过 · 游玩到访' }, { v:2, label:'途经 · 路过没停留' },
  { v:1, label:'落地 · 仅中转' }, { v:0, label:'未踏 · 还没去过' },
]
const CELL = 26  // px/格
const { cols, rows, bbox, regions } = TILE_GEO
const [bx0, by0, bx1, by1] = bbox
const W = (bx1 - bx0) * CELL, H = (by1 - by0) * CELL

const KEY = 'sakura_region_levels_proto'
let levels = {}
try { levels = JSON.parse(localStorage.getItem(KEY) || '{}') } catch {}
const save = () => localStorage.setItem(KEY, JSON.stringify(levels))

const svg = document.getElementById('map')
svg.setAttribute('viewBox', `${-2} ${-2} ${W + 4} ${H + 4}`)
const NS = 'http://www.w3.org/2000/svg'

// 路径坐标从「格」单位 → px，并平移裁剪原点
function scalePath(d) {
  return d.replace(/([\d.]+),([\d.]+)/g, (_, x, y) =>
    `${((+x) - bx0) * CELL},${((+y) - by0) * CELL}`)
}

const shapes = {}, labels = {}
for (const r of regions) {
  const path = document.createElementNS(NS, 'path')
  path.setAttribute('d', scalePath(r.d))
  path.setAttribute('class', 'cellpoly')
  path.setAttribute('fill-rule', 'evenodd')
  path.addEventListener('click', e => openPopup(e, r))
  svg.appendChild(path)
  shapes[r.code] = path

  const t = document.createElementNS(NS, 'text')
  t.setAttribute('x', (r.lx - bx0) * CELL)
  t.setAttribute('y', (r.ly - by0) * CELL)
  // 单格州市字号小一点，避免溢出
  t.setAttribute('font-size', r.n <= 2 ? 10 : r.name.length >= 3 ? 11 : 13)
  t.setAttribute('class', 'rlabel')
  t.textContent = r.name
  svg.appendChild(t)
  labels[r.code] = t
}

function refresh() {
  let total = 0, touched = 0
  for (const r of regions) {
    const lv = levels[r.code] || 0
    shapes[r.code].setAttribute('class', `cellpoly lv${lv}`)
    labels[r.code].setAttribute('class', `rlabel lv${lv}`)
    total += lv; if (lv > 0) touched++
  }
  document.getElementById('score').textContent = total
  document.getElementById('touched').textContent = touched
}

document.getElementById('legend').innerHTML = LEVELS.map(l =>
  `<div class="lg-row"><span class="lg-sw lv${l.v}"></span>${l.label.split(' · ')[0]}<span class="lg-lv">${l.v}</span></div>`
).join('')

const popup = document.getElementById('popup')
let popupRegion = null
function openPopup(e, r) {
  popupRegion = r
  const cur = levels[r.code] || 0
  popup.innerHTML = `<div class="pp-title">@ ${r.name}</div>` +
    LEVELS.map(l => `<button class="pp-item ${l.v===cur?'current':''}" data-v="${l.v}"><span class="lg-sw lv${l.v}"></span>${l.label}</button>`).join('')
  const stage = document.querySelector('.stage').getBoundingClientRect()
  popup.classList.add('open')
  let px = e.clientX - stage.left + 10, py = e.clientY - stage.top - 10
  px = Math.min(px, stage.width - popup.offsetWidth - 4)
  py = Math.max(4, Math.min(py, stage.height - popup.offsetHeight - 4))
  popup.style.left = px + 'px'; popup.style.top = py + 'px'
}
popup.addEventListener('click', e => {
  const btn = e.target.closest('.pp-item'); if (!btn || !popupRegion) return
  const v = +btn.dataset.v
  if (v === 0) delete levels[popupRegion.code]; else levels[popupRegion.code] = v
  save(); refresh(); popup.classList.remove('open')
})
document.addEventListener('click', e => {
  if (!e.target.closest('.popup') && !e.target.closest('.cellpoly')) popup.classList.remove('open')
})

refresh()
</script>
</body>
</html>
