<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: rounded square, pink gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#FF9EC4"/>
    </linearGradient>
    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFE0ED;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#CC4477" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="512" height="512" rx="112" ry="112"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="12"/>

  <!-- Sakura flower centered at 256,256 -->
  <!-- 5 petals, each is an ellipse rotated around center -->
  <g transform="translate(256,256)" filter="url(#shadow)">

    <!-- Petal 1: top -->
    <ellipse cx="0" cy="-82" rx="44" ry="68"
             fill="url(#petal)" transform="rotate(0)"/>
    <!-- Petal 2 -->
    <ellipse cx="0" cy="-82" rx="44" ry="68"
             fill="url(#petal)" transform="rotate(72)"/>
    <!-- Petal 3 -->
    <ellipse cx="0" cy="-82" rx="44" ry="68"
             fill="url(#petal)" transform="rotate(144)"/>
    <!-- Petal 4 -->
    <ellipse cx="0" cy="-82" rx="44" ry="68"
             fill="url(#petal)" transform="rotate(216)"/>
    <!-- Petal 5 -->
    <ellipse cx="0" cy="-82" rx="44" ry="68"
             fill="url(#petal)" transform="rotate(288)"/>

    <!-- Petal notches (heart shape on each tip) -->
    <!-- Petal 1 notch -->
    <circle cx="-10" cy="-140" r="12" fill="#FF9EC4" transform="rotate(0)"/>
    <circle cx="10"  cy="-140" r="12" fill="#FF9EC4" transform="rotate(0)"/>
    <circle cx="-10" cy="-140" r="12" fill="#FF9EC4" transform="rotate(72)"/>
    <circle cx="10"  cy="-140" r="12" fill="#FF9EC4" transform="rotate(72)"/>
    <circle cx="-10" cy="-140" r="12" fill="#FF9EC4" transform="rotate(144)"/>
    <circle cx="10"  cy="-140" r="12" fill="#FF9EC4" transform="rotate(144)"/>
    <circle cx="-10" cy="-140" r="12" fill="#FF9EC4" transform="rotate(216)"/>
    <circle cx="10"  cy="-140" r="12" fill="#FF9EC4" transform="rotate(216)"/>
    <circle cx="-10" cy="-140" r="12" fill="#FF9EC4" transform="rotate(288)"/>
    <circle cx="10"  cy="-140" r="12" fill="#FF9EC4" transform="rotate(288)"/>

    <!-- Center circle -->
    <circle cx="0" cy="0" r="32" fill="#FFD6E7"/>
    <circle cx="0" cy="0" r="20" fill="#FF6B9D"/>

    <!-- Stamens (small dots around center) -->
    <circle cx="0"   cy="-26" r="5" fill="#FFD6E7"/>
    <circle cx="24.7" cy="-8" r="5" fill="#FFD6E7"/>
    <circle cx="15.3" cy="21" r="5" fill="#FFD6E7"/>
    <circle cx="-15.3" cy="21" r="5" fill="#FFD6E7"/>
    <circle cx="-24.7" cy="-8" r="5" fill="#FFD6E7"/>
  </g>
</svg>
